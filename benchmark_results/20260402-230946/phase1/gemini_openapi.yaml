openapi: 3.0.3
info:
  title: Product Wishlist Microservice API
  description: RESTful API for managing user product wishlists.
  version: 1.0.0
servers:
  - url: https://api.example.com/v1
    description: Production Environment
  - url: http://localhost:8080/v1
    description: Local Development
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT containing the user identity (subject).

  schemas:
    Wishlist:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          example: "My Summer Gear"
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductItem'
          readOnly: true
      required:
        - id
        - name
        - createdAt
        - updatedAt

    ProductItem:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        addedAt:
          type: string
          format: date-time
          readOnly: true
      required:
        - productId
        - addedAt

    CreateWishlistRequest:
      type: object
      properties:
        name:
          type: string
          example: "Holiday Gifts"
      required:
        - name

    AddProductRequest:
      type: object
      properties:
        productId:
          type: string
          format: uuid
      required:
        - productId

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

security:
  - bearerAuth: []

paths:
  /wishlists:
    get:
      summary: Get all wishlists for the authenticated user
      operationId: getWishlists
      responses:
        '200':
          description: A list of wishlists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Wishlist'
        '401':
          description: Unauthorized
    post:
      summary: Create a new wishlist
      operationId: createWishlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWishlistRequest'
      responses:
        '201':
          description: Wishlist created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wishlist'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized

  /wishlists/{wishlistId}:
    get:
      summary: Get a specific wishlist
      operationId: getWishlistById
      parameters:
        - name: wishlistId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Wishlist details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wishlist'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Does not belong to user)
        '404':
          description: Wishlist not found

  /wishlists/{wishlistId}/products:
    post:
      summary: Add a product to the wishlist
      operationId: addProductToWishlist
      parameters:
        - name: wishlistId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddProductRequest'
      responses:
        '201':
          description: Product added successfully
        '200':
          description: Product already exists in the wishlist
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Wishlist not found

  /wishlists/{wishlistId}/products/{productId}:
    delete:
      summary: Remove a product from the wishlist
      operationId: removeProductFromWishlist
      parameters:
        - name: wishlistId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Product removed successfully (No Content)
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Wishlist or Product not found