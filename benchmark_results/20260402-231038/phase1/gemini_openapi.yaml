openapi: 3.0.3
info:
  title: Wishlist Microservice API
  description: RESTful API for managing user product wishlists.
  version: 1.0.0
  contact:
    name: Architecture Team
servers:
  - url: https://api.example.com/v1
    description: Production Environment
tags:
  - name: Wishlists
    description: Wishlist management endpoints
paths:
  /wishlists:
    get:
      tags:
        - Wishlists
      summary: Get all wishlists for the authenticated user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: A list of wishlists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Wishlist'
    post:
      tags:
        - Wishlists
      summary: Create a new wishlist
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWishlistRequest'
      responses:
        '201':
          description: Wishlist created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wishlist'

  /wishlists/{wishlistId}:
    get:
      tags:
        - Wishlists
      summary: Get a specific wishlist by ID
      security:
        - BearerAuth: []
      parameters:
        - name: wishlistId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Wishlist details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wishlist'
        '403':
          description: Forbidden (User does not own this wishlist)
        '404':
          description: Wishlist not found

  /wishlists/{wishlistId}/items:
    post:
      tags:
        - Wishlists
      summary: Add a product to the wishlist
      security:
        - BearerAuth: []
      parameters:
        - name: wishlistId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddProductRequest'
      responses:
        '201':
          description: Product added to wishlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductItem'
        '403':
          description: Forbidden
        '404':
          description: Wishlist not found
        '409':
          description: Product already exists in the wishlist

  /wishlists/{wishlistId}/items/{productId}:
    delete:
      tags:
        - Wishlists
      summary: Remove a product from the wishlist
      security:
        - BearerAuth: []
      parameters:
        - name: wishlistId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Product successfully removed
        '403':
          description: Forbidden
        '404':
          description: Wishlist or Product not found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Provide the JWT token issued by the Identity Provider.
  schemas:
    Wishlist:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          example: "My Summer Wardrobe"
        userId:
          type: string
          format: uuid
          readOnly: true
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductItem'
      required:
        - id
        - name
        - userId
        - createdAt
        - updatedAt
        - items
    ProductItem:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        addedAt:
          type: string
          format: date-time
          readOnly: true
      required:
        - productId
        - addedAt
    CreateWishlistRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
      required:
        - name
    AddProductRequest:
      type: object
      properties:
        productId:
          type: string
          format: uuid
      required:
        - productId